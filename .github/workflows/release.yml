name: Release

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Optional label for the release artifacts"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: roku/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install -r docs/website/requirements.txt

      - name: Restore companion
        working-directory: companion
        run: dotnet restore tests/ImmichLoungeCompanion.Tests/ImmichLoungeCompanion.Tests.csproj

      - name: Install Roku dependencies
        working-directory: roku
        run: npm ci

      - name: Test companion
        working-directory: companion
        run: dotnet test --project tests/ImmichLoungeCompanion.Tests/ImmichLoungeCompanion.Tests.csproj --configuration Release

      - name: Publish companion
        working-directory: companion
        run: dotnet publish src/ImmichLoungeCompanion/ImmichLoungeCompanion.csproj -c Release -o artifacts/companion

      - name: Build Roku channel
        working-directory: roku
        run: npm run build

      - name: Build Roku screensaver
        working-directory: roku
        run: npm run build:screensaver

      - name: Build docs
        run: zensical build --clean

      - name: Archive companion
        run: Compress-Archive -Path companion/artifacts/companion/* -DestinationPath companion-release.zip
        shell: pwsh

      - name: Archive Roku channel
        run: Compress-Archive -Path roku/_out/build/channel/* -DestinationPath roku-channel-build.zip
        shell: pwsh

      - name: Archive Roku screensaver
        run: Compress-Archive -Path roku/_out/build/screensaver/* -DestinationPath roku-screensaver-build.zip
        shell: pwsh

      - name: Archive docs
        run: Compress-Archive -Path _out/website/* -DestinationPath docs-site.zip
        shell: pwsh

      - name: Upload companion artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release_name != '' && format('{0}-companion', inputs.release_name) || 'immich-lounge-companion' }}
          path: companion-release.zip

      - name: Upload Roku channel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release_name != '' && format('{0}-roku-channel', inputs.release_name) || 'immich-lounge-roku-channel' }}
          path: roku-channel-build.zip

      - name: Upload Roku screensaver artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release_name != '' && format('{0}-roku-screensaver', inputs.release_name) || 'immich-lounge-roku-screensaver' }}
          path: roku-screensaver-build.zip

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release_name != '' && format('{0}-docs', inputs.release_name) || 'immich-lounge-docs' }}
          path: docs-site.zip
