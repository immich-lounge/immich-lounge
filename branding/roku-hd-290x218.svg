  </linearGradient>
  <linearGradient id="tvSky" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2F73D8"/><stop offset="38%" stop-color="#6748D2"/><stop offset="100%" stop-color="#B56FDB"/>
  </linearGradient>
  <linearGradient id="tvMtnA" x1="0" y1="0" x2="1" y2="1">
