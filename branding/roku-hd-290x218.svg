<!-- Background -->
<rect width="290" height="218" fill="#0D1120"/>
<ellipse cx="145" cy="105" rx="180" ry="130" fill="url(#glow)"/>

<!-- TV icon: scale=0.221, centered at x=145
     Frame top ~33, legs bottom ~148
     Full composition centered at y=109 -->
