  <rect x="190" y="278" width="644" height="430" rx="30" fill="url(#tvFrame)"/>
  <rect x="210" y="298" width="604" height="390" rx="24" fill="url(#tvBezel)"/>
  <rect x="230" y="320" width="564" height="352" rx="20" fill="url(#tvSky)"/>
  <g clip-path="url(#tvClip)">
    <path d="M230 472 C334 432,432 448,522 412 C626 376,726 382,794 436 L794 320 L230 320 Z" fill="#4F31B6" opacity="0.42"/>
    <path d="M230 526 C328 496,418 502,512 468 C610 434,714 438,794 488 L794 572 L230 572 Z" fill="#8E54D3" opacity="0.47"/>
    <circle cx="734" cy="390" r="56" fill="url(#tvSun)"/>
    <path d="M230 584 L398 420 L516 520 L590 450 L794 592 L794 672 L230 672 Z" fill="#FFFFFF"/>
    <path d="M230 672 L230 566 L398 420 L516 520 L648 672 Z" fill="url(#tvMtnA)"/>
    <path d="M334 672 L398 420 L516 520 L468 672 Z" fill="url(#tvMtnAS)" opacity="0.42"/>
    <path d="M468 672 L590 450 L794 592 L794 672 Z" fill="url(#tvMtnB)"/>
