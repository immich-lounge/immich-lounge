</g>

<!-- App name — baseline y=170, ~8px gap below legs -->
<text x="145" y="170" text-anchor="middle"
  font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
  font-size="19" font-weight="700" letter-spacing="1" fill="#FFFFFF">Immich Lounge</text>

<!-- Tagline — baseline y=186 -->
<text x="145" y="186" text-anchor="middle"
  font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
  font-size="10" font-weight="300" letter-spacing="0.5" fill="#8A9BBF">Your memories, on the big screen</text>
